<!DOCTYPE html>
<html>
<head>
    <title>Dashboard | Apex Bank</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="navbar">
        <h2>Apex Bank</h2>
        <a href="/logout">Logout</a>
    </div>

    <div class="container">
        <div class="card balance-display">
            <p>Current Balance</p>
            <h1>₹{{ "{:,.2f}".format(balance) }}</h1>
            <p>User: {{ user }}</p>
        </div>

        <div class="grid">
            <div class="card">
                <h3>Deposit Funds</h3>
                <form action="/deposit" method="POST">
                    <input type="number" name="amount" placeholder="Amount to deposit" required min="1">
                    <button type="submit">Add Cash</button>
                </form>
            </div>
            <div class="card">
                <h3>Withdraw Funds</h3>
                <form action="/withdraw" method="POST">
                    <input type="number" name="amount" placeholder="Amount to withdraw" required min="1">
                    <button type="submit" style="background: var(--danger);">Withdraw Cash</button>
                </form>
            </div>
        </div>

        <div class="card">
            <h3>Recent Transactions</h3>
            <table>
                <thead>
                    <tr>
                        <th>Type</th>
                        <th>Amount</th>
                        <th>Date</th>
                    </tr>
                </thead>
                <tbody>
                    {% for txn in transactions %}
                    <tr>
                        <td class="type-{{ txn.type }}">{{ txn.type }}</td>
                        <td>₹{{ "{:,.2f}".format(txn.amount) }}</td>
                        <td style="color: #64748b;">{{ txn.date }}</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
